apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-redirect-to-https
  namespace: argocd # 🌟 Fix: ArgoCD ke namespace me hi middleware bana diya
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod # ClusterIssuer global hota hai, toh yeh chalega
    traefik.ingress.kubernetes.io/service.serversscheme: https
    # 🌟 Fix: Local namespace wale middleware ko sahi se link kiya
    traefik.ingress.kubernetes.io/router.middlewares: argocd-argocd-redirect-to-https@kubernetescrd
spec:
  tls:
  - hosts:
    - argo-farhan.duckdns.org
    secretName: argocd-server-tls-secret
  rules:
  - host: argo-farhan.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443