apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-portfolio-deployment
  labels:
    app: my-portfolio
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-portfolio
  template:
    metadata:
      labels:
        app: my-portfolio
    spec:
      containers:
      # ─── CONTAINER 1: REACT APP ───
      - name: react-app
        image: farhan091/my-portfolio:204cbe28f78c06445e980305801b67e6943c5d31
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        # 💥 NAYA BADLAAV: ConfigMap file ko Nginx ke andar inject karne ke liye
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d/default.conf # Purani default settings ko overwrite karega
          subPath: default.conf

      # ─── CONTAINER 2: SIDECAR TRANSLATOR ───
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:1.1.0
        args:
        - -nginx.scrape-uri=http://127.0.0.1:80/stub_status
        ports:
        - containerPort: 9113
          name: metrics

      # 💥 NAYA BADLAAV: Pod level par batana ki data kahan se uthana hai
      volumes:
      - name: nginx-config-volume
        configMap:
          name: portfolio-nginx-config # Upar banaye gaye ConfigMap ka naam